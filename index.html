<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Number Battle</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎯 Number Battle</h1>

<div id="home">

<input
id="roomCode"
placeholder="Room Code">

<div class="btns">

<button id="createRoom">
Create Room
</button>

<button id="joinRoom">
Join Room
</button>

</div>

</div>

<div id="game" style="display:none;">

<h2 id="status">
Waiting...
</h2>

<div class="secretBox">

<h3>
Choose Secret Number
</h3>

<input
id="secretNumber"
type="number"
min="1"
max="100"
placeholder="1-100">

<button id="submitNumber">
Submit
</button>

</div>

<hr>

<div id="coinBox" style="display:none;">

<h2>
🪙 Coin Toss
</h2>

<h1 id="coinResult">

Waiting...

</h1>

</div>

<hr>

<div id="guessBox" style="display:none;">

<h2>
Guess Opponent Number
</h2>

<input
id="guessInput"
type="number"
min="1"
max="100"
placeholder="Guess">

<button id="guessBtn">

Guess

</button>

</div>

<h2 id="hint"></h2>

<hr>

<h2>

Guess History

</h2>

<ul id="history">

</ul>

<hr>

<h1 id="winner"></h1>

<button
id="restartBtn"
style="display:none;">

Play Again

</button>

</div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module" src="script.js"></script>

</body>

</html>
